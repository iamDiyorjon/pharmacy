<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport: user-scalable=no prevents pinch-zoom inside the Telegram WebApp
      iframe, which is standard practice for Mini Apps.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#2196f3" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Pharmacy Pickup</title>

    <!--
      Telegram Mini App SDK — MUST be the first script tag.
      Exposes window.Telegram.WebApp with initData, theme params, etc.
      https://core.telegram.org/bots/webapps
    -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      /* Reset */
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        height: 100%;
        /* Use dvh so the layout respects the Telegram header bar height */
        height: 100dvh;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        /* Respect Telegram theme CSS variables with sensible fallbacks */
        background-color: var(--tg-theme-bg-color, #ffffff);
        color: var(--tg-theme-text-color, #222222);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Prevent content from hiding behind iOS safe areas */
        padding-bottom: env(safe-area-inset-bottom);
      }

      /* Spinner keyframe used by the inline React fallback */
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Smooth scrolling inside scroll containers */
      * {
        -webkit-overflow-scrolling: touch;
      }

      /* Remove tap highlight on interactive elements */
      button, a, [role="button"] {
        -webkit-tap-highlight-color: transparent;
        outline: none;
      }

      /* Prevent text size adjustment on orientation change (iOS) */
      body {
        -webkit-text-size-adjust: 100%;
      }

      /* Staff desktop table hover */
      .staff-order-columns {
        flex-wrap: wrap;
      }
      table tbody tr:hover {
        background: #f5f7fa;
      }

      /* Staff responsive: two-column → single column on mobile */
      @media (max-width: 768px) {
        .staff-order-columns {
          flex-direction: column !important;
        }
        .staff-order-columns > div {
          flex: 1 1 auto !important;
          position: static !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
